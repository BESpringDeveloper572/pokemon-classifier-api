services:
  pokemon-api:
    build:
      context: .                          # Look in the current directory
      dockerfile: pokemonapi.Dockerfile
    container_name: pokemon-api
    restart: unless-stopped
    volumes:
      # Map the default pokebase cache folder to a fast named volume
      - pokebase_cache:/home/appuser/.cache/pokebase
    environment:
      - PYTHONUNBUFFERED=1
      - POKEMON_API_KEY=${POKEMON_API_KEY:-CHANGEME_PLEASE}
      - MODEL_NAME=${MODEL_NAME:-skshmjn/Pokemon-classifier-gen9-1025}
    # Port 8000 is NOT exposed to the host for maximum security. 
    # Only zrok can see it inside this network.

  zrok:
    build:
      context: .                          # Look in the same project root
      dockerfile: zrok.Dockerfile         # Explicitly use your rootless Zrok file
    container_name: zrok-share
    restart: unless-stopped
    volumes:
      # Map host's zrok config to the container's zrok user home (ziggy)
      - zrok_home:/home/ziggy/.zrok2
    environment:
      - ZROK_ENABLE_TOKEN=${ZROK_ENABLE_TOKEN}
      - HOME=/home/ziggy
    tty: true
    stdin_open: true
    entrypoint: ""
    command: |
      bash -c "
      if [ ! -d /home/ziggy/.zrok2/identities ]; then
        echo 'Initializing zrok environment...'
        zrok2 enable ${ZROK_ENABLE_TOKEN}
      fi
      zrok2 share public http://pokemon-api:8000 --name-selection public:pokemonapi --headless
      "
    depends_on:
      - pokemon-api

networks:
  default:
    name: pokemon-net

volumes:
  zrok_home: {}
  pokebase_cache: {}
